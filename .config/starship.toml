"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$host\
$directory\
$git_branch\
$git_status\
$fill\
$package\
$golang\
$lua\
$nvim\
$nodejs\
$python\
$rust\
$elixir\
$dart\
$aws\
$time\
$cmd_duration
$character\
"""

[fill]
symbol = " "

[username]
format = " [в•ӯв”Җ$user]($style)@"
style_user = "bold purple"
style_root = "bold purple"
show_always = true

[hostname]
format = "[$hostname]($style) "
style = "bold purple"
trim_at = "-"
ssh_only = false
disabled = false

[directory]
style = "purple"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "у°іҸ "

[git_status]
style = "white"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"

[cmd_duration]
min_time = 1
style = "white"
format = "[$duration]($style)"
disabled = false

[time]
format = " рҹ•ҷ $time($style)"
time_format = "%T"
style = "bright-white"

[character]
success_symbol = " [в•°в”ҖпҶ— ](bold purple)"
error_symbol = " [Г—](bold red)"

[status]
symbol = "рҹ”ҙ"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

[aws]
symbol = "пғҜ  "
format = '[$symbol($profile)(\[$duration\] )]($style)'

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "
format = "[$symbol$context]($style) "
style = "blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "
format = '[$symbol$branch ]($style)'

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[haskell]
symbol = "О» "

[nim]
symbol = "оҡ® "

[nix_shell]
symbol = "пӢң "

[package]
symbol = "п’Ү "

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "оҳҶ "
#pyenv_version_name = true
format = '[${symbol}(${version})(\($virtualenv\) )]($style)'
style = "bold blue"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
symbol = "пҜЈ "

[nodejs]
symbol = "оҙҚ " 
format = "[$symbol$version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]
